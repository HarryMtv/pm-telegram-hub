# nginx reverse proxy (spec §11). Replace api.your-domain.com / app.your-domain.com
# and provision certs with certbot before enabling TLS in production.

# HTTP → HTTPS redirect.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# api.<domain> → Integration Service (webhooks, /api, /health).
server {
  listen 443 ssl;
  http2 on;
  server_name api.your-domain.com;

  ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Webhook payloads are small; provider retries on slow responses.
  client_max_body_size 2m;

  # Preserve the original bytes for HMAC verification.
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  location /health    { proxy_pass http://app:3000; }
  location /webhooks/ { proxy_pass http://app:3000; }
  location /api/      { proxy_pass http://app:3000; }
}

# app.<domain> → Mini App static build (Phase 2 mounts the Vite build).
server {
  listen 443 ssl;
  http2 on;
  server_name app.your-domain.com;

  ssl_certificate     /etc/letsencrypt/live/app.your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.your-domain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;
  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
